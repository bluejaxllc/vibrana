# Vibrana — Local Development Stack
# Usage: docker-compose up --build

version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file: ./backend/.env
    environment:
      - PORT=5001
    volumes:
      - ./backend/snapshots:/app/snapshots
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/status" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    environment:
      - PORT=80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  license-server:
    build: ./license-server
    ports:
      - "3001:3001"
    env_file: ./license-server/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
