<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="16" y1="8" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fill" x1="20" y1="12" x2="44" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer glow -->
  <path d="M32 8 L52 32 L32 56 L12 32 Z" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Diamond / V shape - filled for visibility -->
  <path d="M32 12 L49 32 L32 52 L15 32 Z" stroke="url(#glow)" stroke-width="3" fill="url(#fill)" stroke-linejoin="round"/>
  <!-- Inner pulse dot - larger -->
  <circle cx="32" cy="32" r="6" fill="#a78bfa" opacity="0.95"/>
  <!-- Center bright dot -->
  <circle cx="32" cy="32" r="2.5" fill="#e0d4ff"/>
</svg>
